# ArgoCD Application for the kube-system component
# Manages the mr-do-kube-system resources (Deployment, ServiceAccount, Service)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mr-do-observer-kube-system
  namespace: argocd
  labels:
    app.kubernetes.io/name: mr-do-observer
    app.kubernetes.io/component: kube-system
    app.kubernetes.io/managed-by: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ElTabaco/mr-do-observer.git
    targetRevision: main
    path: kubernetes/kube-system
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  ignoreDifferences:
    # Service runtime fields
    - group: ""
      kind: Service
      jsonPointers:
        - /status
        - /spec/clusterIP
        - /spec/clusterIPs
        - /spec.ipFamilyPolicy
        - /spec.ipFamilies