# ArgoCD Application for Grafana
# Manages:
#   - grafana Deployment + Service
#   - grafana PV + PVC (NFS)
#
# Depends on the monitoring namespace (kubernetes/base/namespace.yml).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mr-do-observer-grafana
  namespace: argocd
  labels:
    app.kubernetes.io/name: mr-do-observer
    app.kubernetes.io/component: grafana
    app.kubernetes.io/managed-by: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ElTabaco/mr-do-observer.git
    targetRevision: main
    path: kubernetes/grafana
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  ignoreDifferences:
    # Service runtime fields
    - group: ""
      kind: Service
      jsonPointers:
        - /status
        - /spec.loadBalancerIP
        - /spec/clusterIP
        - /spec/clusterIPs
        - /spec/externalTrafficPolicy
        - /spec/ipFamilyPolicy
        - /spec/ipFamilies
        - /spec/sessionAffinity
