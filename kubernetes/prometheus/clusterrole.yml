apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-kubelet-scraper
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/metrics
      - nodes/proxy
      - pods
      - services
      - endpoints
    verbs: ["get", "list", "watch"]
  # Allow scraping /metrics on non-resource URLs.
  # Required for MetalLB controller-runtime metrics auth (SubjectAccessReview
  # checks the caller can get /metrics). Also covers any other controller
  # using the same auth pattern (cert-manager, etc).
  - nonResourceURLs: ["/metrics"]
    verbs: ["get"]
