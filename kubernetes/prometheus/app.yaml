# ArgoCD Application for Prometheus
# Manages:
#   - prometheus Deployment + Service
#   - prometheus PV + PVC (NFS, for TSDB persistence)
#   - prometheus ConfigMap (scrape config), ClusterRole, ClusterRoleBinding
#
# Depends on the monitoring namespace created by mr-do-observer-grafana.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mr-do-observer-prometheus
  namespace: argocd
  labels:
    app.kubernetes.io/name: mr-do-observer
    app.kubernetes.io/component: prometheus
    app.kubernetes.io/managed-by: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ElTabaco/mr-do-observer.git
    targetRevision: main
    path: kubernetes/prometheus
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  ignoreDifferences:
    # Service runtime fields
    - group: ""
      kind: Service
      jsonPointers:
        - /status
        - /spec/loadBalancerIP
        - /spec/clusterIP
        - /spec/clusterIPs
        - /spec/externalTrafficPolicy
        - /spec/ipFamilyPolicy
        - /spec/ipFamilies
        - /spec/sessionAffinity
