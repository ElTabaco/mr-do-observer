# ArgoCD Application for base cluster resources
#
# Shared resources that other components depend on. Sync-wave -1 on
# namespace.yml ensures the monitoring namespace exists before any
# grafana/prometheus/kube-state-metrics resources apply.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mr-do-observer-base
  namespace: argocd
  labels:
    app.kubernetes.io/name: mr-do-observer
    app.kubernetes.io/component: base
    app.kubernetes.io/managed-by: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ElTabaco/mr-do-observer.git
    targetRevision: main
    path: kubernetes/base
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
